name: diary_android
description: Cupertino-themed markdown diary for Android
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  flutter_markdown: ^0.7.4+1
  path: ^1.9.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: false
