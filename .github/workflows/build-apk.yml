name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android local.properties for CI
        run: |
          {
            echo "flutter.sdk=$FLUTTER_ROOT"
            if [ -n "$ANDROID_SDK_ROOT" ]; then
              echo "sdk.dir=$ANDROID_SDK_ROOT"
            elif [ -n "$ANDROID_HOME" ]; then
              echo "sdk.dir=$ANDROID_HOME"
            fi
          } > android/local.properties

      - name: Set up Gradle (for wrapper bootstrap)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper JAR
        working-directory: android
        run: gradle wrapper --gradle-version 8.7

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: diary-android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
